<!DOCTYPE html>
<html lang="ur">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Sukoon AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body class="theme-dark">
    <div id="navBackdrop" class="nav-backdrop" aria-hidden="true"></div>

    <!-- Left sidebar — mood, emotion, chips -->
    <aside id="leftSidebar" class="left-sidebar" aria-label="Sidebar">
      <div class="left-sidebar-scroll">
        <div class="brand-block fade-in-item">
          <div class="logo-gradient" aria-hidden="true">🧠</div>
          <h1 class="logo-title">Sukoon AI</h1>
          <p class="tagline">Apna haal batao</p>
        </div>
        <div class="divider"></div>

        <section class="side-block">
          <p class="side-label">Aaj ka mood</p>
          <div class="mood-hero">
            <span id="moodEmoji" class="mood-emoji-xl" aria-hidden="true">🙂</span>
            <div class="mood-score-line">
              <span id="moodValue" class="mood-num">6</span><span class="mood-den">/10</span>
            </div>
          </div>
          <input
            id="moodSlider"
            class="mood-slider-premium"
            type="range"
            min="1"
            max="10"
            step="1"
            value="6"
            aria-label="Mood one to ten"
          />
          <canvas id="moodChart" class="mood-sparkline" width="200" height="50" aria-label="Mood sparkline"></canvas>
        </section>

        <div class="divider"></div>

        <section class="side-block">
          <p class="side-label">Mehsoos ho raha hai:</p>
          <div id="emotionBadge" class="emotion-badge-premium" style="--emotion-glow: #14b8a6">
            <span id="emotionEmoji" class="emotion-emoji-lg" aria-hidden="true">😐</span>
            <span id="emotionUrdu" class="emotion-urdu">ٹھیک</span>
          </div>
        </section>

        <div class="divider"></div>

        <button
          type="button"
          class="btn-report-sidebar js-report-btn"
          title="Apni weekly mental health report download karo"
        >
          📊 Meri Report
        </button>

        <section class="side-block chip-stack" id="quickChips">
          <button type="button" class="chip-v" data-prompt="Aj anxiety feel ho rahi hai, dil tez dhadak raha hai.">
            😰 Anxiety hai
          </button>
          <button type="button" class="chip-v" data-prompt="Bahut udaas hun, kuch samajh nahi aa raha.">😢 Udaas hun</button>
          <button type="button" class="chip-v" data-prompt="Ghar mei tension hai, log kya kahenge wala pressure hai.">
            😤 Ghar tension
          </button>
          <button type="button" class="chip-v" data-prompt="Exams ka buhat pressure hai, neend kharab hai.">
            📚 Exam pressure
          </button>
          <button type="button" class="chip-v" data-prompt="Neend nahi aa rahi, dimagh chalta rehta hai.">
            😴 Neend nahi
          </button>
          <button type="button" class="chip-v" data-prompt="Apnapan nahi mehsoos ho raha, akela lag raha hun.">
            😞 Akela hun
          </button>
        </section>
      </div>
      <a class="umang-sidebar-btn" href="tel:03174288665">🆘 Umang — 0317-4288665</a>
    </aside>

    <!-- Main column -->
    <div class="app-main">
      <header class="top-bar">
        <button type="button" id="navOpenBtn" class="icon-circle hamburger-only" aria-label="Open menu">☰</button>
        <h2 class="top-bar-title">Sukoon AI</h2>
        <div class="top-bar-actions">
          <button
            type="button"
            class="icon-circle btn-report-compact js-report-btn"
            title="Apni weekly mental health report download karo"
            aria-label="Meri weekly report"
          >
            📊
          </button>
          <button type="button" id="voiceMuteBtn" class="icon-circle" aria-pressed="false" aria-label="Mute AI voice">🔊</button>
          <button type="button" id="themeToggle" class="icon-circle" aria-label="Toggle theme">🌙</button>
          <button type="button" id="openSidebarBtn" class="icon-circle" aria-label="Past sessions">📋</button>
          <button type="button" id="clearHistoryBtn" class="icon-circle icon-danger-soft" aria-label="Clear chat">🗑️</button>
        </div>
      </header>

      <div id="memoryBar" class="memory-strip hidden" aria-live="polite">
        <span class="memory-ico">💭</span>
        <span id="memoryInsightText" class="memory-text"></span>
      </div>

      <div class="chat-flex">
        <div id="chatScroll" class="chat-scroll">
          <section id="chat" class="msg-list" aria-live="polite"></section>

          <div id="typingIndicator" class="typing-plate hidden" aria-live="polite">
            <div class="typing-plate-inner">
              <span class="avatar-teal-xs" aria-hidden="true">🧠</span>
              <div class="typing-dots" aria-hidden="true">
                <span></span><span></span><span></span>
              </div>
              <span class="typing-label">Soch raha hun...</span>
            </div>
          </div>

          <article id="exerciseBreathing" class="ex-card ex-breathing hidden">
            <div class="ex-card-head">
              <h3 class="ex-title">Saans ka mashq</h3>
              <button type="button" class="text-link" id="hideBreathingBtn">Band</button>
            </div>
            <div class="breath-row">
              <div id="breathCircle" class="breath-dot" aria-hidden="true"></div>
              <div class="breath-meta">
                <p id="breathPhaseText" class="breath-phase">Taiyar?</p>
                <p id="breathTimer" class="breath-timer">—</p>
              </div>
            </div>
            <button type="button" class="btn-primary-wide" id="breathToggleBtn">Shuru karo</button>
          </article>

          <article id="exerciseGrounding" class="ex-card ex-grounding hidden">
            <div class="ex-card-head">
              <h3 class="ex-title">🌿 Grounding — 5-4-3-2-1</h3>
              <button type="button" class="text-link" id="hideGroundingBtn">Band</button>
            </div>
            <div class="grounding-progress-track" aria-hidden="true">
              <div id="groundingProgressFill" class="grounding-progress-fill" style="width: 0%"></div>
            </div>
            <div id="groundingList" class="grounding-checks"></div>
            <p id="groundingDone" class="grounding-celebrate hidden">Shahbash! Tum bilkul theek ho 🌟</p>
          </article>
        </div>

        <div class="composer">
          <p id="reportHint" class="report-hint" aria-live="polite"></p>
          <p id="micStatus" class="voice-status" aria-live="polite"></p>
          <div class="composer-row">
            <button type="button" id="micBtn" class="btn-mic" aria-label="Voice input">🎤</button>
            <label class="sr-only" for="messageInput">Message</label>
            <textarea
              id="messageInput"
              class="composer-textarea"
              rows="1"
              placeholder="Apna haal batao... (Roman Urdu ya English mein)"
            ></textarea>
            <button type="button" id="sendBtn" class="btn-send" disabled aria-label="Send message">→</button>
          </div>
        </div>
      </div>
    </div>

    <!-- History — right overlay -->
    <div id="historyBackdrop" class="history-backdrop" aria-hidden="true"></div>
    <aside id="historySidebar" class="history-panel" aria-hidden="true">
      <div class="history-head">
        <h2 class="history-title">📋 Pichli Baatein</h2>
        <button type="button" id="sidebarClose" class="icon-circle" aria-label="Close">✕</button>
      </div>
      <div id="sessionsList" class="history-list"></div>
      <button type="button" class="btn-danger-wide" id="clearAllSessionsBtn">Sab saf karo</button>
    </aside>

    <script id="sukoon-bootstrap" type="application/json">
{{ {
  "session_id": session_id,
  "history": history,
  "mood_history": mood_history,
  "latest_memory_insight": latest_memory_insight,
  "recent_sessions": recent_sessions
}|tojson }}
    </script>
    <script src="/static/app.js" defer></script>
  </body>
</html>
