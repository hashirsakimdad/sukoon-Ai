<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sukoon AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <meta name="theme-color" content="#0F0F1A" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body class="theme-dark">
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <span class="brand-logo">S</span>
            <span class="brand-heart" aria-hidden="true">♥</span>
          </div>
          <div class="brand-text">
            <div class="brand-title">Sukoon AI</div>
            <div class="brand-tagline">Apna haal batao — hum sunenge 🤍</div>
          </div>
        </div>

        <button id="themeToggle" class="icon-btn" type="button" aria-label="Toggle theme">
          <span class="icon" aria-hidden="true">☼</span>
          <span class="icon-btn-text">Theme</span>
        </button>
      </header>

      <section class="panel mood-panel" aria-label="Mood">
        <div class="panel-head">
          <div class="panel-title">Mood</div>
          <div class="mood-live">
            <span id="moodEmoji" class="mood-emoji" aria-hidden="true">🙂</span>
            <span id="moodValue" class="mood-value">6</span><span class="mood-outof">/10</span>
          </div>
        </div>
        <div class="mood-row">
          <input id="moodSlider" class="mood-slider" type="range" min="1" max="10" step="1" value="6" />
          <canvas id="moodChart" class="mood-chart" width="220" height="46" aria-label="Mood chart"></canvas>
        </div>
        <div class="mood-scale" aria-hidden="true">
          <span>1</span><span>3</span><span>5</span><span>7</span><span>10</span>
        </div>
      </section>

      <section class="panel emotion-panel" aria-label="Emotion">
        <div class="emotion-left">
          <div class="panel-title">Emotion</div>
          <div class="emotion-sub">Auto-detected from your message</div>
        </div>
        <div id="emotionBadge" class="emotion-badge" style="--badge:#34D399">
          <span class="emotion-icon" aria-hidden="true">●</span>
          <span id="emotionText">Okay</span>
        </div>
      </section>

      <main class="chat-area" aria-label="Chat">
        <section id="chat" class="chat"></section>

        <div id="typing" class="typing hidden" aria-live="polite" aria-label="Sukoon AI is typing">
          <div class="typing-bubble">
            <span class="dot"></span><span class="dot"></span><span class="dot"></span>
          </div>
        </div>

        <section id="exerciseCard" class="exercise hidden" aria-label="Exercise card">
          <div class="exercise-head">
            <div class="exercise-title" id="exerciseTitle">Exercise</div>
            <button id="exerciseClose" class="text-btn" type="button">Hide</button>
          </div>

          <div id="breathingBox" class="exercise-box hidden" data-kind="breathing">
            <div class="breathing-wrap">
              <div class="breathing-circle" aria-hidden="true"></div>
              <div class="breathing-text" id="breathingText">Saans lo...</div>
              <div class="breathing-sub">Aaram se, apni pace par</div>
            </div>
          </div>

          <div id="groundingBox" class="exercise-box hidden" data-kind="grounding">
            <div class="grounding-title">5-4-3-2-1 grounding</div>
            <div class="grounding-sub">Checklist complete karte jao</div>
            <div class="grounding-list" id="groundingList"></div>
          </div>
        </section>

        <section class="composer" aria-label="Input">
          <div class="composer-row">
            <input
              id="messageInput"
              class="message-input"
              type="text"
              placeholder="Apna haal batao... (Roman Urdu ya English)"
              autocomplete="off"
              maxlength="1000"
            />

            <button id="micBtn" class="icon-btn mic" type="button" aria-label="Voice input">
              <span class="icon" aria-hidden="true">🎤</span>
            </button>

            <button id="sendBtn" class="send-btn" type="button">Send</button>
          </div>

          <div class="mic-status" id="micStatus" aria-live="polite"></div>

          <div class="chips" aria-label="Quick prompts">
            <button class="chip" type="button" data-prompt="Bohot anxiety ho rahi hai">Bohot anxiety ho rahi hai</button>
            <button class="chip" type="button" data-prompt="Ghar mein tension hai">Ghar mein tension hai</button>
            <button class="chip" type="button" data-prompt="Neend nahi aati">Neend nahi aati</button>
            <button class="chip" type="button" data-prompt="Exam ka pressure hai">Exam ka pressure hai</button>
            <button class="chip" type="button" data-prompt="Akela feel ho raha hun">Akela feel ho raha hun</button>
          </div>
        </section>
      </main>

      <footer class="footer">
        Mushkil waqt mein: Umang 0317-4288665
      </footer>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
