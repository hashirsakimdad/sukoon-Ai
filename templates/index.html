<!DOCTYPE html>
<html lang="ur">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sukoon AI — Apna haal batao 🤍</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body class="theme-dark">
    <aside id="historySidebar" class="history-sidebar" aria-hidden="true">
      <div class="sidebar-header">
        <h2>Pichli baatein</h2>
        <button type="button" class="icon-btn" id="sidebarClose" aria-label="Close sidebar">✕</button>
      </div>
      <div id="sessionsList" class="sessions-list"></div>
      <button type="button" class="danger-btn full" id="clearAllSessionsBtn">Sab saf karo</button>
    </aside>
    <div id="sidebarBackdrop" class="sidebar-backdrop hidden" aria-hidden="true"></div>

    <header class="site-header">
      <div class="header-inner">
        <div class="brand">
          <span class="brand-logo" aria-hidden="true">🧠</span>
          <div>
            <div class="brand-title">Sukoon AI</div>
            <p class="brand-tagline">Apna haal batao — hum sunenge 🤍</p>
          </div>
        </div>
        <div class="header-actions">
          <button type="button" class="ghost-btn sidebar-toggle-main" id="openSidebarBtn">📋 Pichli Baatein</button>
          <button type="button" class="icon-btn" id="themeToggle" aria-label="Dark light toggle">🌙</button>
          <button type="button" class="icon-btn danger-outline" id="clearHistoryBtn" aria-label="Clear history">🗑️</button>
        </div>
      </div>
    </header>

    <main class="main-wrap">
      <div id="memoryBar" class="memory-bar hidden">
        <span class="memory-bar-label">Yaad:</span>
        <span id="memoryInsightText" class="memory-bar-text"></span>
      </div>

      <section class="card mood-card">
        <h2 class="section-title">Aaj mood kaisa hai?</h2>
        <div class="mood-row">
          <span id="moodEmoji" class="mood-emoji" aria-hidden="true">🙂</span>
          <span class="mood-value-wrap"
            ><span id="moodValue">6</span><span class="mood-slash">/10</span></span
          >
        </div>
        <input
          id="moodSlider"
          type="range"
          min="1"
          max="10"
          step="1"
          value="6"
          class="mood-slider"
          aria-label="Mood one to ten"
        />
        <canvas
          id="moodChart"
          class="mood-canvas"
          width="300"
          height="80"
          aria-label="Mood chart last ten"
        ></canvas>
      </section>

      <section class="emotion-strip">
        <div id="emotionBadge" class="emotion-badge" style="--emotion: #34d399">
          <span>Mahsoos ho raha hai:</span>
          <strong id="emotionUrdu">ٹھیک</strong>
          <span id="emotionEmoji" class="emotion-ico" aria-hidden="true">😐</span>
        </div>
      </section>

      <section id="chat" class="chat-area" aria-live="polite" aria-label="Chat messages"></section>

      <div id="typingIndicator" class="typing-indicator hidden" aria-live="polite">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>

      <section id="exerciseBreathing" class="card exercise-card hidden" data-ex="breathing">
        <div class="ex-head">
          <h3>Saans wala mashq</h3>
          <button type="button" class="text-btn" id="hideBreathingBtn">Band karo</button>
        </div>
        <div class="breathing-stage">
          <div id="breathCircle" class="breath-circle"></div>
          <p id="breathPhaseText" class="breath-phase">Taiyar?</p>
        </div>
        <button type="button" class="primary-btn" id="breathToggleBtn">Shuru karo</button>
      </section>

      <section id="exerciseGrounding" class="card exercise-card hidden" data-ex="grounding">
        <div class="ex-head">
          <h3>5-4-3-2-1 Grounding</h3>
          <button type="button" class="text-btn" id="hideGroundingBtn">Band karo</button>
        </div>
        <div id="groundingList" class="grounding-list"></div>
        <p id="groundingDone" class="grounding-done hidden">Shahbash! Tum bilkul theek ho 🌟</p>
      </section>

      <section class="card chips-card">
        <div class="chips" id="quickChips">
          <button type="button" class="chip" data-prompt="Aj anxiety feel ho rahi hai, dil tez dhadak raha hai.">
            😰 Anxiety hai
          </button>
          <button type="button" class="chip" data-prompt="Bahut udaas hun, kuch samajh nahi aa raha.">😢 Udaas hun</button>
          <button type="button" class="chip" data-prompt="Ghar mei tension hai, log kya kahenge wala pressure hai.">
            😤 Ghar tension
          </button>
          <button type="button" class="chip" data-prompt="Exams ka buhat pressure hai, neend kharab hai.">
            📚 Exam pressure
          </button>
          <button type="button" class="chip" data-prompt="Neend nahi aa rahi, dimagh chalta rehta hai.">😴 Neend nahi</button>
          <button type="button" class="chip" data-prompt="Apnapan nahi mehsoos ho raha, akela lag raha hun.">
            😞 Akela hun
          </button>
        </div>
      </section>

      <section class="card input-card">
        <label class="sr-only" for="messageInput">Message</label>
        <div class="input-row">
          <textarea
            id="messageInput"
            class="msg-textarea"
            rows="2"
            placeholder="Dil ki baat likho... (Enter bhejo, Shift+Enter nayi line)"
          ></textarea>
          <div class="input-actions">
            <button type="button" id="micBtn" class="mic-btn" aria-label="Voice input">🎤</button>
            <button type="button" id="sendBtn" class="send-btn" aria-label="Send">➤</button>
          </div>
        </div>
        <p id="micStatus" class="mic-status" aria-live="polite"></p>
      </section>
    </main>

    <footer class="crisis-footer">
      <span>🆘 Umang Helpline:</span>
      <a href="tel:03174288665">0317-4288665</a>
    </footer>

    <script id="sukoon-bootstrap" type="application/json">
{{ {
  "session_id": session_id,
  "history": history,
  "mood_history": mood_history,
  "latest_memory_insight": latest_memory_insight,
  "recent_sessions": recent_sessions
}|tojson }}
    </script>
    <script src="/static/app.js" defer></script>
  </body>
</html>
